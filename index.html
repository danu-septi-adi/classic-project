<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClassicProject | Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: "#d4af37",
              dark: "#050505",
              shopee: "#ee4d2d",
              tokopedia: "#42b549",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
            animation: {
              "slow-pan": "pan 15s linear infinite",
              shimmer: "shimmer 2s infinite linear",
            },
            keyframes: {
              pan: {
                "0%": { transform: "scale(1)" },
                "100%": { transform: "scale(1.15)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-200% 0" },
                "100%": { backgroundPosition: "200% 0" },
              },
            },
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @layer components {
        .glass-nav {
          @apply fixed top-0 w-full z-[1000] px-[8%] py-4 bg-dark/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center;
        }
        .market-shopee:hover {
          @apply text-shopee scale-125 rotate-6;
        }
        .market-tokopedia:hover {
          @apply text-tokopedia scale-125 rotate-6;
        }
        .market-tiktok:hover {
          @apply text-white scale-125 rotate-6;
        }
        .btn-premium {
          @apply inline-block px-10 py-3.5 border border-gold text-gold rounded-full font-semibold uppercase tracking-widest text-[0.75rem] transition-all duration-500 hover:bg-gold hover:text-black hover:shadow-[0_10px_30px_rgba(212,175,55,0.3)];
        }
        .product-card {
          @apply bg-white/[0.03] border border-white/10 rounded-2xl p-2.5 backdrop-blur-sm transition-all duration-500 cursor-pointer hover:-translate-y-2 hover:border-gold/30 hover:bg-white/[0.07];
        }
        .skeleton {
          @apply relative overflow-hidden bg-white/5 animate-shimmer;
          background-image: linear-gradient(
            90deg,
            rgba(255, 255, 255, 0) 0,
            rgba(255, 255, 255, 0.05) 50%,
            rgba(255, 255, 255, 0) 100%
          );
          background-size: 200% 100%;
        }
        .category-reveal {
          @apply opacity-0 translate-y-10 transition-all duration-700 ease-out;
        }
        .category-reveal.active {
          @apply opacity-100 translate-y-0;
        }
      }
    </style>
  </head>

  <body class="bg-dark text-white font-sans overflow-x-hidden">
    <nav class="glass-nav">
      <a href="index.html" class="font-serif text-xl tracking-wider text-white"
        ><span class="text-gold">Classic</span>Project</a
      >
      <div id="market-container" class="flex gap-7 items-center"></div>
    </nav>

    <section
      id="hero"
      class="relative h-[85vh] w-full flex items-center justify-center overflow-hidden text-center"
    >
      <div id="hero-slider" class="absolute inset-0 z-0"></div>
      <div
        id="hero-content"
        class="relative z-10 px-5 opacity-0 translate-y-10 transition-all duration-[1.5s]"
      >
        <h1
          id="main-title"
          class="font-serif text-5xl md:text-7xl mb-4 bg-gradient-to-b from-white to-gold bg-clip-text text-transparent leading-tight"
        >
          Crafting Excellence
        </h1>
        <p
          id="main-sub"
          class="text-gray-400 text-base md:text-lg mb-8 max-w-xl mx-auto font-light italic"
        >
          Koleksi Aksesoris Premium.
        </p>
      </div>
    </section>

    <main id="catalog" class="relative z-10 px-[8%] py-16 bg-dark">
      <div id="catalog-container" class="space-y-24"></div>
    </main>

    <footer
      class="py-10 text-center border-t border-white/5 text-gray-600 text-sm"
    >
      <p>
        &copy; 2026 <span class="text-gold">Classic</span>Project. Crafted for
        Excellence.
      </p>
    </footer>

    <script>
      let currentSlide = 0;
      let slides = [];

      async function init() {
        try {
          const response = await fetch("data.json");
          const data = await response.json();
          renderMarkets(data.marketplaces);
          renderHeroSlider(data.config.heroImages);
          renderHomeCatalog(data.products);
          document.getElementById("main-title").innerText =
            data.config.heroTitle;
          document.getElementById("main-sub").innerText =
            data.config.heroSubtitle;
          setTimeout(
            () =>
              document
                .getElementById("hero-content")
                .classList.remove("opacity-0", "translate-y-10"),
            300,
          );
          setupScrollReveal();
        } catch (err) {
          console.error(err);
        }
      }

      function renderMarkets(markets) {
        const container = document.getElementById("market-container");
        container.innerHTML = markets
          .map((m) => {
            let hC = m.name.toLowerCase().includes("shopee")
              ? "market-shopee"
              : m.name.toLowerCase().includes("tokopedia")
                ? "market-tokopedia"
                : "market-tiktok";
            return `<a href="${m.url}" target="_blank" class="text-white text-xl transition-all duration-500 ${hC}"><i class="bi ${m.icon}"></i></a>`;
          })
          .join("");
      }

      function renderHeroSlider(images) {
        const container = document.getElementById("hero-slider");
        container.innerHTML = images
          .map(
            (img, i) =>
              `<div class="absolute inset-0 bg-cover bg-center transition-opacity duration-[2000ms] opacity-0 brightness-[0.4] ${i === 0 ? "opacity-100 scale-110 animate-slow-pan" : ""}" style="background-image: url('${img}')"></div>`,
          )
          .join("");
        slides = container.querySelectorAll("div");
        setInterval(() => {
          slides[currentSlide].classList.remove(
            "opacity-100",
            "animate-slow-pan",
          );
          slides[currentSlide].classList.add("opacity-0");
          currentSlide = (currentSlide + 1) % slides.length;
          slides[currentSlide].classList.remove("opacity-0");
          slides[currentSlide].classList.add("opacity-100", "animate-slow-pan");
        }, 6000);
      }

      function renderHomeCatalog(products) {
        const container = document.getElementById("catalog-container");
        const categories = [...new Set(products.map((p) => p.category))];

        container.innerHTML = categories
          .map((cat) => {
            const catProducts = products.filter((p) => p.category === cat);
            const preview = catProducts.slice(0, 8);

            return `
        <div class="category-reveal">
            <div class="flex justify-between items-end mb-8 border-l-2 border-gold pl-4">
                <h2 class="font-serif text-2xl">${cat}</h2>
                <a href="category.html?c=${encodeURIComponent(cat)}" 
                   class="text-gold text-[11px] font-bold uppercase tracking-[0.2em] hover:text-white transition-colors">
                   Lihat Semua <i class="bi bi-arrow-right ml-1"></i>
                </a>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                ${preview
                  .map(
                    (p) => `
                    <div class="product-card flex flex-col" onclick="window.open('${p.link}', '_blank')">
                        <div class="w-full aspect-square rounded-xl overflow-hidden mb-4 relative skeleton">
                            <img src="${p.image}" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" onload="this.parentElement.classList.remove('skeleton');this.classList.remove('opacity-0')">
                        </div>
                        <div class="px-2 pb-2">
                            <h3 class="text-base font-medium text-gray-200 mb-1">${p.name}</h3>
                            <p class="text-gold font-bold text-lg">${p.price}</p>
                        </div>
                    </div>`,
                  )
                  .join("")}
            </div>
        </div>`;
          })
          .join("");
      }

      function setupScrollReveal() {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) e.target.classList.add("active");
            });
          },
          { threshold: 0.1 },
        );
        document
          .querySelectorAll(".category-reveal")
          .forEach((el) => observer.observe(el));
      }

      window.onload = init;
    </script>
  </body>
</html>
